<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Juice POS - تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
        }
        .brand-logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ff4757;
            text-align: center;
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .brand-sub {
            text-align: center;
            color: #747d8c;
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 2px solid #f1f2f6;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #ff4757;
            box-shadow: none;
        }
        .btn-login {
            background: #ff4757;
            border: none;
            color: white;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: #e84118;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 61, 0, 0.3);
        }
        .error-msg {
            color: #ff4757;
            background: #ffeaa7;
            padding: 0.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">Bob Juice 🍊</div>
    <div class="brand-sub">نظام إدارة المبيعات والمخزون</div>
    
    <div id="errorMessage" class="error-msg"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">اسم المستخدم</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="أدخل اسم المستخدم" required autocomplete="username">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">كلمة المرور</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">تسجيل الدخول</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        
        const formData = new FormData();
        formData.append('username', document.getElementById('username').value);
        formData.append('password', document.getElementById('password').value);

        try {
            const response = await fetch('/token', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                window.location.href = '/';
            } else {
                const errorData = await response.json();
                errorDiv.textContent = errorData.detail || 'اسم المستخدم أو كلمة المرور غير صحيحة';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'حدث خطأ في الاتصال بالسيرفر';
            errorDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
