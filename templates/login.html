<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOB JUICE — Sign In</title>
  <link rel="stylesheet" href="/static/app.css?v=20260704g" />
  <script src="/static/bob-auth.js"></script>
  <script src="/static/bob-tab-session.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body.login-portal {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; max-height: 100vh;
      background: radial-gradient(ellipse at 20% 0%, rgba(249,115,22,.12) 0%, transparent 50%), #0d0d0d;
      font-family: var(--font, Inter, system-ui, sans-serif);
      padding: .75rem;
      box-sizing: border-box;
    }
    .login-card {
      width: 100%; max-width: 380px;
      background: rgba(26,26,26,.96); border: 1px solid #333; border-radius: 14px;
      padding: 1.15rem 1.35rem 1rem; box-shadow: 0 20px 48px rgba(0,0,0,.5);
      box-sizing: border-box;
    }
    .login-logo-wrap {
      display: flex; justify-content: center; align-items: center;
      margin: 0 0 .65rem;
    }
    .login-logo-wrap img {
      width: 108px; height: 108px; object-fit: cover; border-radius: 50%;
      display: block; box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .login-title { text-align: center; font-size: 1.25rem; font-weight: 800; margin: 0 0 .2rem; line-height: 1.2; }
    .login-sub { text-align: center; color: #a3a3a3; font-size: .8125rem; margin: 0 0 .85rem; line-height: 1.35; }
    .login-card .input-group { margin-bottom: .55rem; }
    .login-card .input-group label { font-size: .75rem; margin-bottom: .2rem; }
    .login-card .input {
      padding: .45rem .65rem; font-size: .875rem; min-height: 0;
    }
    .login-card .btn-lg {
      padding: .55rem 1rem; font-size: .9375rem; min-height: 0;
    }
    .login-links { text-align: center; margin-top: .85rem; font-size: .75rem; color: #737373; line-height: 1.4; }
  </style>
</head>
<body class="login-portal">
  <div class="login-card">
    <div class="login-logo-wrap">
      <img src="/static/logo_circular.png" alt="BOB JUICE" width="108" height="108" style="border-radius:50%!important;object-fit:cover!important;width:108px!important;height:108px!important;border:2px solid #334e4e!important;display:block;" />
    </div>
    <h1 class="login-title" id="login-title">Sign In</h1>
    <p class="login-sub" id="login-sub">Enter your credentials to continue.</p>
    <div class="input-group"><label>Username</label><input id="login-user" type="text" class="input" autocomplete="username" autofocus /></div>
    <div class="input-group"><label>Password</label><input id="login-pass" type="password" class="input" autocomplete="current-password" /></div>
    <button type="button" id="login-btn" class="btn btn-primary btn-lg" style="width:100%;margin-top:.45rem">Sign In</button>
    <p class="login-links">
      <a href="/" id="pos-link" style="color:#f97316;text-decoration:none">Cashier POS</a>
      ·
      <a href="/login?portal=admin" style="color:#facc15;text-decoration:none">Admin Portal</a>
    </p>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script>
    (function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bob_theme')||'dark');})();
    const params = new URLSearchParams(location.search);
    const portal = params.get('portal') === 'admin' ? 'admin' : 'pos';
    const Auth = BobAuth.create(portal);
    const $ = id => document.getElementById(id);
    function toast(m){$('toast').textContent=m;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),3000);}
    if (portal === 'admin') {
      $('login-title').textContent = 'Admin Portal';
      $('login-sub').textContent = 'Management dashboard — reports, catalog, and settings.';
    } else {
      $('login-title').textContent = 'Cashier POS';
      $('login-sub').textContent = 'Point of sale — sign in to open your shift.';
    }
    async function tryRestore() {
      const r = await Auth.restore();
      if (!r.ok) return;
      BobTabSession.markTabOpen(portal);
      if (portal === 'admin') {
        try {
          const perms = await Auth.req('/api/users/permissions');
          if (perms.permissions?.admin_dashboard) location.replace('/admin/dashboard');
        } catch (_) { await Auth.logout(); }
      } else {
        location.replace('/');
      }
    }
    async function doLogin() {
      const u = $('login-user').value.trim();
      const p = $('login-pass').value;
      if (!u || !p) { toast('Enter username and password'); return; }
      const b = new FormData();
      b.append('username', u);
      b.append('password', p);
      try {
        const d = await Auth.req('/api/auth/login', { method: 'POST', body: b, headers: { 'X-Bob-Portal': portal } });
        const tokenKey = portal === 'admin' ? 'bob_admin_token' : 'bob_token';
        const userKey = portal === 'admin' ? 'bob_admin_user' : 'bob_user';
        localStorage.setItem(tokenKey, d.access_token);
        localStorage.setItem(userKey, JSON.stringify({ id: d.user_id, full_name: d.full_name, username: d.username, role: d.role }));
        BobTabSession.markTabOpen(portal);
        if (portal === 'admin') {
          const perms = await Auth.req('/api/users/permissions');
          if (!perms.permissions?.admin_dashboard) throw new Error('This account does not have admin dashboard access');
          location.href = '/admin/dashboard';
        } else {
          location.href = '/';
        }
      } catch (err) {
        toast(err.message || 'Login failed');
      }
    }
    $('login-btn').onclick = doLogin;
    ['login-user','login-pass'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doLogin(); } }));
    tryRestore();
  </script>
</body>
</html>
