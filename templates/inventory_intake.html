<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOB JUICE — Inventory Intake</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script src="/static/bob-auth.js"></script>
  <script src="/static/bob-tab-session.js"></script>
</head>
<body>
<div id="app" style="min-height:100vh;padding:1.25rem;max-width:900px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem">
    <h1 style="margin:0;font-weight:800">Inventory Intake (Purchases)</h1>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap">
      <a href="/admin/dashboard" class="btn btn-secondary btn-sm">← Admin</a>
      <a href="/stock-in" class="btn btn-ghost btn-sm">Stock In</a>
      <a href="/stock-out" class="btn btn-ghost btn-sm">Stock Out</a>
    </div>
  </div>
  <div class="card" style="padding:1.25rem;margin-bottom:1rem">
    <form id="intake-form" class="form-grid">
      <div class="input-group span-2"><label>Supplier</label><input id="intake-supplier" class="input" list="supplier-list" required placeholder="Select or type supplier…" /></div>
      <div class="input-group span-2"><label>Inventory Item</label><input id="intake-item" class="input" list="inv-item-list" required placeholder="Raw ingredient…" /></div>
      <div class="input-group"><label>Quantity</label><input id="intake-qty" type="number" step="0.001" min="0.001" class="input" required /></div>
      <div class="input-group"><label>Unit</label><input id="intake-unit" class="input" placeholder="kg, L, pcs…" /></div>
      <div class="input-group"><label>Unit Cost USD</label><input id="intake-cost" type="number" step="0.0001" min="0.0001" class="input" required /></div>
      <div class="input-group"><label>Payment Status</label><select id="intake-pay" class="select"><option value="unpaid">Unpaid</option><option value="partial">Partially Paid</option><option value="paid">Paid</option></select></div>
      <div class="input-group"><label>Amount Paid USD</label><input id="intake-paid" type="number" step="0.01" min="0" class="input" value="0" /></div>
      <div class="input-group"><label>Intake Date</label><input id="intake-date" type="date" class="input" required /></div>
      <div class="span-2"><button class="btn btn-primary">Record Purchase Intake</button></div>
    </form>
  </div>
  <div class="card" style="padding:1.25rem">
    <h3 style="margin:0 0 .75rem;font-weight:700">Recent Intakes</h3>
    <table class="data"><thead><tr><th>Date</th><th>Supplier</th><th>Item</th><th>Qty</th><th>Total USD</th><th>Status</th></tr></thead><tbody id="intake-table"></tbody></table>
  </div>
  <datalist id="inv-item-list"></datalist>
  <datalist id="supplier-list"></datalist>
</div>
<div id="toast" class="toast hidden"></div>
<script>
(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('bob_theme')||'dark');})();
const Auth=BobAuth.create('admin');
let suppliers=[];
const $=id=>document.getElementById(id);
const fmt=n=>Number(n).toFixed(2);
const toast=m=>{$('toast').textContent=m;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),3000);};
async function boot(){
  if(!(await Auth.restore()).ok){location.href='/login?portal=admin';return;}
  const[items,sups,intakes]=await Promise.all([Auth.req('/api/inventory/items'),Auth.req('/api/finance/suppliers'),Auth.req('/api/finance/intakes')]);
  suppliers=sups;
  $('inv-item-list').innerHTML=items.map(i=>`<option value="${i.name}"></option>`).join('');
  $('supplier-list').innerHTML=sups.map(s=>`<option value="${s.name}"></option>`).join('');
  $('intake-table').innerHTML=intakes.map(i=>`<tr><td>${i.intake_date}</td><td>${i.supplier_name}</td><td>${i.inventory_item_name}</td><td>${i.quantity} ${i.unit}</td><td>$${fmt(i.total_cost_usd)}</td><td><span class="badge badge-accent">${i.payment_status}</span></td></tr>`).join('')||'<tr><td colspan="6">No intake records</td></tr>';
  $('intake-date').value=new Date().toISOString().slice(0,10);
}
$('intake-form').onsubmit=async e=>{e.preventDefault();const name=$('intake-supplier').value.trim();const match=suppliers.find(s=>s.name.toLowerCase()===name.toLowerCase());const payload={inventory_item_name:$('intake-item').value.trim(),quantity:+$('intake-qty').value,unit:($('intake-unit').value||'pcs').trim(),unit_cost_usd:+$('intake-cost').value,payment_status:$('intake-pay').value,amount_paid_usd:+$('intake-paid').value,intake_date:$('intake-date').value,notes:null};if(match)payload.supplier_id=match.id;else payload.supplier_name=name;try{await Auth.req('/api/finance/intakes',{method:'POST',body:JSON.stringify(payload)});toast('Intake recorded');$('intake-form').reset();boot();}catch(err){toast(err.message);}};
boot().catch(()=>location.href='/login?portal=admin');
</script>
</body>
</html>
